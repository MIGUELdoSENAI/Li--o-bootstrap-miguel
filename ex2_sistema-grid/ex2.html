<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container mt-4">
    <h2 class="text-center mb-4">Sistema de Grid</h2>

    <!-- Row 1: duas colunas iguais -->
    <div class="row mb-3">
        <div class="col-sm-6 bg-primary text-white p-3">
            <h5>Coluna 1</h5>
            <p>Esta coluna ocupa 6/12 da linha em telas pequenas ou maiores.</p>
        </div>
        <div class="col-sm-6 bg-secondary text-white p-3">
            <h5>Coluna 2</h5>
            <p>Esta coluna ocupa as outras 6/12, ficando lado a lado com a Coluna 1.</p>
        </div>
    </div>

    <!-- Row 2: três colunas -->
    <div class="row mb-3">
        <div class="col-sm-4 bg-success text-white p-3">col-sm-4</div>
        <div class="col-sm-4 bg-warning text-dark p-3">col-sm-4</div>
        <div class="col-sm-4 bg-danger text-white p-3">col-sm-4</div>
    </div>

    <!-- Row 3: colunas desiguais -->
    <div class="row">
        <div class="col-sm-8 bg-info text-dark p-3">
            <strong>col-sm-8</strong> — coluna maior (8/12)
        </div>
        <div class="col-sm-4 bg-dark text-white p-3">
            <strong>col-sm-4</strong> — coluna menor (4/12)
        </div>
    </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
