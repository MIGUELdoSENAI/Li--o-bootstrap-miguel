 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5b: Formulário Minimalista</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Fundo com cor suave e fonte minimalista */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card do formulário com bordas bem arredondadas e sombra suave */
        .card-login {
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: none;
            background-color: #ffffff;
            padding: 2.5rem 2rem;
        }

        /* Estilização dos Inputs e Ícones */
        .input-group {
            border-radius: 16px;
            transition: all 0.3s ease;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
        }

        .input-group-text {
            background-color: transparent;
            border: none;
            color: #9ca3af;
            padding-left: 1.2rem;
        }

        .form-control {
            border: none;
            background-color: transparent;
            padding: 0.8rem 1rem;
            color: #374151;
            box-shadow: none !important; /* Remove o brilho padrão do Bootstrap */
        }

        .form-control::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        /* Efeito de foco (quando clica no input) */
        .input-group:focus-within {
            border-color: #8b5cf6; /* Cor roxa suave */
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }
        .input-group:focus-within .input-group-text {
            color: #8b5cf6;
        }

        /* Botão Moderno com transição suave */
        .btn-custom {
            background-color: #8b5cf6;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Espaço entre texto e ícone */
        }

        .btn-custom:hover {
            background-color: #7c3aed;
            transform: translateY(-2px); /* Efeito de flutuar */
            box-shadow: 0 8px 15px rgba(139, 92, 246, 0.25);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-8 col-lg-5 col-xl-4">
                
                <div class="card card-login">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: #1f2937;">Bem-vindo de volta</h3>
                        <p class="text-muted" style="font-size: 0.9rem;">Por favor, insira seus dados para entrar.</p>
                    </div>

                    <form>
                        <div class="mb-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email" class="form-control" placeholder="Seu endereço de e-mail" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control" placeholder="Sua senha secreta" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 px-1" style="font-size: 0.85rem;">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="lembrar">
                                <label class="form-check-label text-muted" for="lembrar">Lembrar de mim</label>
                            </div>
                            <a href="#" style="color: #8b5cf6; text-decoration: none; font-weight: 500;">Esqueceu a senha?</a>
                        </div>

                        <button type="submit" class="btn btn-custom w-100">
                            Entrar na Conta <i class="bi bi-arrow-right"></i>
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted" style="font-size: 0.9rem;">Ainda não tem uma conta? </span>
                        <a href="#" style="color: #8b5cf6; text-decoration: none; font-weight: 500;">Registre-se</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
