<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<!-- PRIMEIRA NAVBAR (ESCURA) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="#">
      <i class="bi bi-bootstrap"></i> MeuSite
    </a>

    <!-- Botão hamburguer -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu1">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="menu1">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Início</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Sobre</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Serviços</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Contato</a>
        </li>
      </ul>
    </div>

  </div>
</nav>


<!-- SEGUNDA NAVBAR (COM ÍCONES) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mt-5">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="#">
      <i class="bi bi-globe"></i> Navegação
    </a>

    <!-- Botão hamburguer -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu2">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links com ícones -->
    <div class="collapse navbar-collapse" id="menu2">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-house"></i> Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-person"></i> Perfil
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-envelope"></i> Mensagens
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            <i class="bi bi-gear"></i> Configurações
          </a>
        </li>

      </ul>
    </div>

  </div>
</nav>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
