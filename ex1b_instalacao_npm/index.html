<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap teste</title>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Meu Site</a>
  </div>
</nav>


<div class="container mt-4">

  <!-- TITULO -->
  <h1 class="text-primary">Página com Bootstrap</h1>

  <!-- BOTÕES -->
  <button class="btn btn-primary">Azul</button>
  <button class="btn btn-success">Verde</button>
  <button class="btn btn-danger">Vermelho</button>


  <!-- GRID -->
  <div class="row mt-4">

    <div class="col-md-4 bg-primary text-white p-3">
      Coluna 1
    </div>

    <div class="col-md-4 bg-success text-white p-3">
      Coluna 2
    </div>

    <div class="col-md-4 bg-danger text-white p-3">
      Coluna 3
    </div>

  </div>


  <!-- CARD -->
  <div class="card mt-4" style="width: 18rem;">
    <div class="card-body">
      <h5 class="card-title">Card exemplo</h5>
      <p class="card-text">Usando Bootstrap com npm</p>
      <button class="btn btn-warning">Clique</button>
    </div>
  </div>


  <!-- FORM -->
  <form class="mt-4">

    <div class="mb-2">
      <input class="form-control" placeholder="Nome">
    </div>

    <div class="mb-2">
      <input class="form-control" placeholder="Email">
    </div>

    <button class="btn btn-dark">
      Enviar
    </button>

  </form>

</div>


<script type="module" src="/main.js"></script>

</body>
</html>
