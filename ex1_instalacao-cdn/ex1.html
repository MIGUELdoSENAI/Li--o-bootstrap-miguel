<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução ao Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 text-center">
        <h1 class="mb-4">Introdução ao Bootstrap</h1>

        <button id="meuBotao" class="btn btn-primary btn-lg">
            Clique aqui!
        </button>

        <p id="mensagem" class="mt-3 fs-5 text-success d-none">
            Botão clicado com sucesso!
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const botao = document.getElementById('meuBotao');
        const mensagem = document.getElementById('mensagem');

        botao.addEventListener('click', () => {
            mensagem.classList.toggle('d-none');
            botao.classList.toggle('btn-primary');
            botao.classList.toggle('btn-success');
            botao.textContent = mensagem.classList.contains('d-none')
                ? 'Clique aqui!'
                : 'Clicado!';
        });
    </script>

</body>
</html>
