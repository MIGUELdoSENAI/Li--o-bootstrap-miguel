<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3: Botões com Bootstrap e Ícones</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

    <h2 class="text-center mt-4">Botões Básicos</h2>
    
    <div class="container d-flex justify-content-center flex-wrap mt-3">
        <button type="button" class="btn btn-primary ms-3 mb-2">Primary</button>
        <button type="button" class="btn btn-secondary ms-3 mb-2">Secondary</button>
        <button type="button" class="btn btn-success ms-3 mb-2">Success</button>
        <button type="button" class="btn btn-danger ms-3 mb-2">Danger</button>
        <button type="button" class="btn btn-warning ms-3 mb-2">Warning</button>
        <button type="button" class="btn btn-info ms-3 mb-2">Info</button>
        <button type="button" class="btn btn-dark ms-3 mb-2">Dark</button>
    </div>

    <hr class="my-4">

    <h2 class="text-center">Botões com Ícones</h2>

    <div class="container d-flex justify-content-center flex-wrap mt-3">
        <button type="button" class="btn btn-primary ms-3 mb-2">
            <i class="bi bi-search"></i> Pesquisar
        </button>
        
        <button type="button" class="btn btn-success ms-3 mb-2">
            <i class="bi bi-check-circle"></i> Salvar
        </button>
        
        <button type="button" class="btn btn-danger ms-3 mb-2">
            <i class="bi bi-trash"></i> Excluir
        </button>

        <button type="button" class="btn btn-warning ms-3 mb-2">
            <i class="bi bi-exclamation-triangle"></i> Alerta
        </button>

        <button type="button" class="btn btn-outline-dark ms-3 mb-2" title="Configurações">
            <i class="bi bi-gear-fill"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
